<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeBuddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">&lt;/&gt;</div>
          <div>
            <div class="logo-text">CodeBuddy</div>
            <div class="logo-sub">AI Coding Mentor</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">Topik Cepat</div>
        <div class="topic-list">
          <button class="topic-btn" data-topic="Jelaskan konsep async/await di JavaScript dengan contoh kode">
            <span class="topic-icon">JS</span>
            <span>Async/Await</span>
          </button>
          <button class="topic-btn" data-topic="Apa perbedaan antara REST API dan GraphQL? Mana yang lebih baik?">
            <span class="topic-icon">API</span>
            <span>REST vs GraphQL</span>
          </button>
          <button class="topic-btn" data-topic="Buatkan contoh CRUD sederhana menggunakan React dan fetch API">
            <span class="topic-icon">RX</span>
            <span>React CRUD</span>
          </button>
          <button class="topic-btn" data-topic="Bagaimana cara kerja Git branch dan merge? Jelaskan dengan contoh">
            <span class="topic-icon">GT</span>
            <span>Git Branching</span>
          </button>
          <button class="topic-btn" data-topic="Jelaskan SOLID Principle dengan contoh kode yang mudah dipahami">
            <span class="topic-icon">SD</span>
            <span>SOLID Principles</span>
          </button>
          <button class="topic-btn" data-topic="Tips debugging yang efektif untuk pemula">
            <span class="topic-icon">DB</span>
            <span>Debugging Tips</span>
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="server-status" id="server-status">
          <span class="status-dot"></span>
          <span>Mengecek koneksi...</span>
        </div>
        <button id="clear-chat" class="btn-clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          Hapus Chat
        </button>
      </div>
    </aside>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Main -->
    <main class="main">
      <header class="main-header">
        <button id="menu-toggle" class="menu-toggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
        </button>
        <div class="header-title">
          <h1>CodeBuddy</h1>
          <span class="header-badge">Gemini 2.5 Flash</span>
        </div>
      </header>

      <div id="chat-box" class="chat-box">
        <div class="welcome">
          <div class="welcome-mark">&lt;/&gt;</div>
          <h2>Mau ngoding apa hari ini?</h2>
          <p>Tanya apa aja soal programming. CodeBuddy siap bantu.</p>
          <div class="welcome-chips">
            <button class="chip" data-topic="Jelaskan konsep async/await di JavaScript">Async/Await</button>
            <button class="chip" data-topic="Buatkan contoh CRUD sederhana menggunakan React">React CRUD</button>
            <button class="chip" data-topic="Tips debugging yang efektif untuk pemula">Debugging</button>
            <button class="chip" data-topic="Jelaskan SOLID Principle dengan contoh kode">SOLID</button>
          </div>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <div class="input-group">
          <input type="text" id="user-input" placeholder="Tanya sesuatu..." autocomplete="off" required />
          <button type="submit" id="send-btn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
