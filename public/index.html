<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeBuddy</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">CodeBuddy</span>
      </div>

      <div class="sidebar-section">
        <h3>Topik Cepat</h3>
        <div class="quick-topics">
          <button class="topic-btn" data-topic="Jelaskan konsep async/await di JavaScript dengan contoh kode">Async/Await</button>
          <button class="topic-btn" data-topic="Apa perbedaan antara REST API dan GraphQL? Mana yang lebih baik?">REST vs GraphQL</button>
          <button class="topic-btn" data-topic="Buatkan contoh CRUD sederhana menggunakan React dan fetch API">React CRUD</button>
          <button class="topic-btn" data-topic="Bagaimana cara kerja Git branch dan merge? Jelaskan dengan contoh">Git Branching</button>
          <button class="topic-btn" data-topic="Jelaskan SOLID Principle dengan contoh kode yang mudah dipahami">SOLID Principles</button>
          <button class="topic-btn" data-topic="Tips debugging yang efektif untuk pemula">Debugging Tips</button>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="server-status" id="server-status">
          <span class="status-dot"></span>
          <span>Mengecek koneksi...</span>
        </div>
        <button id="clear-chat" class="btn-clear">Hapus Chat</button>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="overlay" id="overlay"></div>

    <!-- Main Chat -->
    <main class="main">
      <header class="main-header">
        <button id="menu-toggle" class="menu-toggle">&#9776;</button>
        <h1>CodeBuddy</h1>
      </header>

      <div id="chat-box" class="chat-box">
        <div class="welcome">
          <h2>CodeBuddy</h2>
          <p>AI Coding Mentor. Tanya apa aja soal programming.</p>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <input type="text" id="user-input" placeholder="Tanya sesuatu..." autocomplete="off" required />
        <button type="submit" id="send-btn" disabled>Send</button>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
